name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Get Code
        uses: actions/checkout@v4

      - name: 2. Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.4.1

      - name: 4. Build APK and Bundle (AAB)
        # This will create both the installable APK and the Play Store AAB
        run: gradle assembleDebug bundleDebug

      - name: 5. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 6. Upload AAB (Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-AAB
          path: app/build/outputs/bundle/debug/*.aab
